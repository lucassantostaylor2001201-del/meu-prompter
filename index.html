<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Prompter - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #333333 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1rem;
        }

        .tab-btn {
            background: rgba(255,255,255,0.95);
            color: #000000;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            border: 2px solid rgba(255,255,255,0.9);
            transition: all 0.25s ease;
            cursor: pointer;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.12);
        }

        .tab-btn.active {
            background: #000000;
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }

        .tab-btn-full {
            grid-column: 1 / -1;
        }

        .prompter-area {
            background: #000000;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1rem;
            color: #ffffff;
            font-family: 'Inter', monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            padding: 1.25rem;
            min-height: 320px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease;
            width: 100%;
        }

        .prompter-area:focus {
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        .prompter-area::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .btn-send {
            background: rgba(255,255,255,0.95);
            color: #000000;
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            border: 2px solid white;
            transition: all 0.25s ease;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }

        .btn-send:hover {
            background: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.15);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-log {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            padding: 1rem;
            min-height: 80px;
            max-height: 160px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .status-log::-webkit-scrollbar {
            width: 4px;
        }

        .status-log::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
        }

        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-info { color: rgba(255,255,255,0.5); }

        .selected-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .config-input {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            color: #ffffff;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            outline: none;
            width: 100%;
            transition: border-color 0.3s;
        }

        .config-input:focus {
            border-color: rgba(255,255,255,0.4);
        }

        .config-input::placeholder {
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1.5rem;">
            <div>
                <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tight" style="background: linear-gradient(135deg, #ffffff 0%, #666666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Telegram Prompter</h1>
                <p class="text-sm font-light mt-1" style="color: rgba(255,255,255,0.4);">Painel de controle para postagem em topicos</p>
            </div>
            <button onclick="toggleConfig()" class="text-xs font-bold uppercase tracking-widest px-4 py-2 rounded-lg" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
                Configuracao
            </button>
        </div>

        <!-- Config Panel -->
        <div id="configPanel" class="hidden glass p-6 mb-6">
            <h3 class="text-sm font-bold uppercase tracking-widest mb-4" style="color: rgba(255,255,255,0.6);">Configuracao da API</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest block mb-2" style="color: rgba(255,255,255,0.3);">Bot Token</label>
                    <input type="text" id="cfgToken" class="config-input" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest block mb-2" style="color: rgba(255,255,255,0.3);">Group ID</label>
                    <input type="text" id="cfgGroup" class="config-input" placeholder="-1001234567890">
                </div>
            </div>
            <h4 class="text-[10px] font-bold uppercase tracking-widest mb-3" style="color: rgba(255,255,255,0.3);">Topic IDs</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4" id="topicConfigFields"></div>
            <button onclick="saveConfig()" class="text-xs font-bold uppercase tracking-widest px-6 py-2.5 rounded-lg" style="background: white; color: black; transition: all 0.3s;">
                Salvar Configuracao
            </button>
        </div>

        <!-- Selected Topic Indicator -->
        <div class="flex items-center mb-4 px-1">
            <div id="selectedDot" class="selected-indicator" style="display: none;"></div>
            <span class="text-xs font-bold uppercase tracking-widest" style="color: rgba(255,255,255,0.5);">Topico: </span>
            <span id="selectedTopicName" class="text-xs font-black uppercase tracking-widest ml-2 text-white">Nenhum selecionado</span>
        </div>

        <!-- Tab Buttons Grid -->
        <div class="grid grid-cols-2 gap-3 mb-6" id="tabGrid">
            <button class="tab-btn" onclick="selectTab('resultados', this)">
                Resultados
            </button>
            <button class="tab-btn" onclick="selectTab('conversao_freebet', this)">
                Conversao Freebet
            </button>
            <button class="tab-btn" onclick="selectTab('surebet', this)">
                Surebet
            </button>
            <button class="tab-btn" onclick="selectTab('coletagem_freebet', this)">
                Coletagem Freebet
            </button>
            <button class="tab-btn" onclick="selectTab('zero_risco', this)">
                Zero Risco
            </button>
            <button class="tab-btn" onclick="selectTab('rodadas_gratis', this)">
                Rodadas Gratis
            </button>
            <button class="tab-btn tab-btn-full" onclick="selectTab('avisos', this)">
                Avisos
            </button>
        </div>

        <div class="divider mb-6"></div>

        <!-- Textarea -->
        <textarea id="prompterText" class="prompter-area mb-4" placeholder="Digite a mensagem aqui... Selecione um topico acima antes de enviar."></textarea>

        <!-- Send Button -->
        <button id="btnSend" class="btn-send mb-4" onclick="enviarMensagem()">
            ENVIAR MENSAGEM
        </button>

        <!-- Status Log -->
        <div class="status-log" id="statusLog">
            <div class="log-info">[SISTEMA] Prompter inicializado. Selecione um topico e digite sua mensagem.</div>
        </div>

    </div>

    <script>
        // ===== CONFIGURATION =====
        let BOT_TOKEN = '';
        let GROUP_ID = '';

        const TOPIC_MAP = {
            'resultados':        { id: 0,   label: 'Resultados' },
            'conversao_freebet': { id: 0,   label: 'Conversao Freebet' },
            'surebet':           { id: 0,   label: 'Surebet' },
            'coletagem_freebet': { id: 0,   label: 'Coletagem Freebet' },
            'zero_risco':        { id: 0,   label: 'Zero Risco' },
            'rodadas_gratis':    { id: 0,   label: 'Rodadas Gratis' },
            'avisos':            { id: 0,   label: 'Avisos' }
        };

        let selectedThreadKey = null;

        // Load saved config
        function loadConfig() {
            const saved = localStorage.getItem('prompter_config');
            if (saved) {
                try {
                    const cfg = JSON.parse(saved);
                    BOT_TOKEN = cfg.token || '';
                    GROUP_ID = cfg.groupId || '';
                    if (cfg.topics) {
                        for (const [key, value] of Object.entries(cfg.topics)) {
                            if (TOPIC_MAP[key]) {
                                TOPIC_MAP[key].id = value;
                            }
                        }
                    }
                    document.getElementById('cfgToken').value = BOT_TOKEN;
                    document.getElementById('cfgGroup').value = GROUP_ID;
                    addLog('Configuracao carregada do armazenamento local.', 'info');
                } catch(e) {
                    addLog('Erro ao carregar configuracao salva.', 'error');
                }
            }
        }

        function saveConfig() {
            const token = document.getElementById('cfgToken').value.trim();
            const groupId = document.getElementById('cfgGroup').value.trim();

            BOT_TOKEN = token;
            GROUP_ID = groupId;

            const topics = {};
            for (const key of Object.keys(TOPIC_MAP)) {
                const input = document.getElementById('topic_' + key);
                if (input) {
                    TOPIC_MAP[key].id = parseInt(input.value) || 0;
                    topics[key] = TOPIC_MAP[key].id;
                }
            }

            localStorage.setItem('prompter_config', JSON.stringify({
                token: BOT_TOKEN,
                groupId: GROUP_ID,
                topics: topics
            }));

            addLog('Configuracao salva com sucesso.', 'success');
            toggleConfig();
        }

        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                renderTopicConfig();
            }
        }

        function renderTopicConfig() {
            const container = document.getElementById('topicConfigFields');
            container.innerHTML = '';
            for (const [key, topic] of Object.entries(TOPIC_MAP)) {
                container.innerHTML += `
                    <div>
                        <label class="text-[10px] font-bold uppercase tracking-widest block mb-1" style="color: rgba(255,255,255,0.3);">${topic.label}</label>
                        <input type="text" id="topic_${key}" class="config-input" placeholder="Topic ID" value="${topic.id || ''}">
                    </div>
                `;
            }
        }

        // ===== TAB SELECTION =====
        function selectTab(key, btnElement) {
            // Remove active from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Set active
            btnElement.classList.add('active');
            selectedThreadKey = key;

            // Update indicator
            document.getElementById('selectedDot').style.display = 'inline-block';
            document.getElementById('selectedTopicName').textContent = TOPIC_MAP[key].label;

            addLog(`Topico selecionado: ${TOPIC_MAP[key].label}`, 'info');
        }

        // ===== SEND MESSAGE =====
        async function enviarMensagem() {
            const text = document.getElementById('prompterText').value.trim();
            const btn = document.getElementById('btnSend');

            // Validation
            if (!selectedThreadKey) {
                addLog('ERRO: Nenhum topico selecionado. Clique em uma aba antes de enviar.', 'error');
                return;
            }

            if (!text) {
                addLog('ERRO: O campo de texto esta vazio.', 'error');
                return;
            }

            if (!BOT_TOKEN) {
                addLog('ERRO: Bot Token nao configurado. Abra a configuracao e insira o token.', 'error');
                return;
            }

            if (!GROUP_ID) {
                addLog('ERRO: Group ID nao configurado. Abra a configuracao e insira o ID do grupo.', 'error');
                return;
            }

            const topic = TOPIC_MAP[selectedThreadKey];
            if (!topic || topic.id === 0) {
                addLog(`ERRO: Topic ID nao definido para "${topico.label}". Configure na aba de configuracao.`, 'error');
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.textContent = 'ENVIANDO...';

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            const body = {
                chat_id: GROUP_ID,
                message_thread_id: topic.id,
                text: text,
                parse_mode: 'HTML'
            };

            addLog(`Enviando para "${topic.label}" (Thread ID: ${topic.id})...`, 'info');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.ok) {
                    addLog('Mensagem enviada com sucesso.', 'success');
                    document.getElementById('prompterText').value = '';
                } else {
                    const errMsg = data.description || 'Erro desconhecido';
                    addLog(`ERRO ao enviar: ${errMsg}`, 'error');
                }
            } catch (error) {
                addLog(`ERRO de conexao: ${error.message}`, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'ENVIAR MENSAGEM';
        }

        // ===== LOG SYSTEM =====
        function addLog(message, type = 'info') {
            const log = document.getElementById('statusLog');
            const now = new Date();
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const entry = document.createElement('div');
            entry.className = `log-${type}`;
            entry.textContent = `[${time}] ${message}`;

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // ===== INIT =====
        loadConfig();

        // Keyboard shortcut: Ctrl+Enter to send
        document.getElementById('prompterText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                enviarMensagem();
            }
        });
    </script>

</body>
</html>
